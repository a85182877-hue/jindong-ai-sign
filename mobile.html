【專業人體力學知識庫】

- 【下肢與膝蓋】：膝蓋無力通常是因四大肌肉鋼索失衡產生的「前後夾擊」或「左右拉扯」導致空間壓縮。小腿腓腸肌（Gastrocnemius）緊繃會像絞盤一樣拉扯足底筋膜。
- 【腰背與脊椎】：久坐使前側「髂腰肌（Iliopsoas）」縮短，與後側肌肉「前後拔河」擠壓腰椎空間。駝背會縮短「闊背肌（Latissimus Dorsi）」這條牽引繩索，向上引發膏肓痛、向下鎖死下背活動。
- 【臀肌與骨盆】：深層「梨狀肌（Piriformis）」失去彈性會擠壓周圍空間影響循環產生麻感。臀中肌（Gluteus Medius）、臀小肌（Gluteus Minimus）無力會逼迫腰部代償引發慢性腰痛。
- 【肩頸】：提肩胛肌（Levator Scapulae）與斜方肌（Trapezius）上束長期處於代償狀態，會像拉緊的鋼纜一樣鎖住頸椎活動空間。
